pipeline:
  name: "agent_intent_classifier"
  version: "1.0.0"
  preprocessing:
    tokenizer: "bert-base-uncased"
    max_length: 128
  model_params:
    type: "classifier" # or 'llm_eval'
    base_model: "bert-base-uncased"
    num_labels: 5
    batch_size: 32
    learning_rate: 2e-5
  monitoring:
    compliance_officer: "Security_Lead"
    metrics: ["f1_score", "latency_ms"]